name: Substrate Bridge — Insight Log Sync

on:
  # Manual trigger with optional parameters
  workflow_dispatch:
    inputs:
      force_full_sync:
        description: 'Force full sync (ignore manifest)'
        required: false
        default: 'false'
        type: boolean
  
  # Scheduled: twice daily at 08:00 and 20:00 UTC (16:00 and 04:00 MYT)
  schedule:
    - cron: '0 8,20 * * *'

permissions:
  contents: write
  pull-requests: write

env:
  NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
  NODE_VERSION: '22'

jobs:
  sync-insight-log:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install bridge dependencies
        run: npm install @notionhq/client notion-to-md --save-dev

      - name: Clear manifest (if force sync)
        if: ${{ github.event.inputs.force_full_sync == 'true' }}
        run: rm -f src/data/bridge/sync-manifest.json

      - name: Fetch Insight Log from Notion
        run: npx tsx scripts/bridge/fetch-insight-log.ts

      - name: Run Crystallization Layer
        run: npx tsx scripts/bridge/crystallize.ts

      - name: Rebuild content graph
        run: npm run build:graph

      - name: Check for changes
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain src/content/field-signals/ src/data/bridge/ src/data/generated/)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in field signals"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi

      - name: Create PR branch
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          BRANCH_NAME="bridge/insight-log-sync-$(date +%Y%m%d-%H%M)"
          git config --global user.name 'Substrate Bridge λ-node'
          git config --global user.email 'bridge@oscillatoryfields.com'
          git checkout -b "$BRANCH_NAME"
          git add src/content/field-signals/ src/data/bridge/ src/data/generated/
          
          # Count new/updated signals
          NEW_COUNT=$(git diff --cached --name-only src/content/field-signals/ | wc -l)
          
          git commit -m "bridge: crystallize ${NEW_COUNT} field signals from Insight Log

          Substrate Bridge v2.0 — λ-node crystallization pass.
          All signals marked draft:true pending τ-node validation.
          
          Source: Notion Insight Log (${NOTION_INSIGHT_LOG_URL:-323eb86fd1b08127a7acfa79076bf208})
          Crystallized: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          
          git push origin "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bridge/insight-log-sync-${{ github.run_number }}
          title: "🔭 Bridge Sync: New field signals from Insight Log"
          body: |
            ## Substrate Bridge v2.0 — λ-node Crystallization

            This PR contains newly crystallized field signals from the Notion Insight Log.
            
            **All signals are `draft: true`** — they will not render on the site until you:
            1. Review each `.mdx` file in `src/content/field-signals/`
            2. Edit any frontmatter or body content that needs adjustment
            3. Set `draft: false` on signals you approve for publication
            4. Merge the PR

            ### τ-node Validation Checklist
            - [ ] Review signal titles and summaries for accuracy
            - [ ] Verify domain and lineage inference
            - [ ] Check cross-references against actual corpus
            - [ ] Confirm lexicon candidates are correctly extracted
            - [ ] Set `draft: false` on approved signals
            - [ ] Remove or archive any signals that should not publish

            ### Constitutional Constraints
            - The λ-node proposes. The τ-node validates.
            - No signal publishes without explicit `draft: false`.
            - Provenance links back to Notion source in every file.
            
            ---
            *Generated by Substrate Bridge v2.0 at ${{ github.event.head_commit.timestamp || 'scheduled run' }}*
          labels: |
            bridge-sync
            needs-tau-validation
          draft: true
