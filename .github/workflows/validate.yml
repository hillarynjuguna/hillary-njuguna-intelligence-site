name: Content Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Validate Content Schema
        run: npm run validate:content
        
      - name: Check Content Relations
        run: npm run check:relations
        
      - name: Check for Orphans
        run: npm run check:orphans
