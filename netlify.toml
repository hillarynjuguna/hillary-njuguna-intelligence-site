[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# ── URL hygiene ──
[[redirects]]
  from = "/index"
  to = "/"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security Headers ──
[[headers]]
  for = "/*"
  [headers.values]
    # Prevents clickjacking
    X-Frame-Options = "DENY"
    # Prevents MIME sniffing
    X-Content-Type-Options = "nosniff"
    # Controls referrer info
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permissions policy — lock down what browser APIs are accessible
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # HSTS — enforce HTTPS (uncomment once on custom domain)
    # Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://formspree.io; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://formspree.io"

# ── Static asset caching ──
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"
